apiVersion: batch/v1
kind: Job
metadata:
  name: smoketest
  annotations:
  argocd.argoprojct.io/hook: PostSync
  argocd.argoprojct.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
        - name: smoketest
          image: curlimages/curl:8.4.0
          command:
          - sh
          - -c 
          - |
            echo "Running smoke test...";
            curl -f http://backend:8080/health;
      restartPolicy: Never