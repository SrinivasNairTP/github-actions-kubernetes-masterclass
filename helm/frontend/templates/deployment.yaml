spec:
  automountServiceAccountToken: false

  containers:
    - name: frontend

      image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        allowPrivilegeEscalation: false

      volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx

        - name: nginx-run
          mountPath: /var/run

        - name: nginx-tmp
          mountPath: /tmp

  volumes:
    - name: nginx-cache
      emptyDir: {}

    - name: nginx-run
      emptyDir: {}

    - name: nginx-tmp
      emptyDir: {}