name: CI Pipeline

on:
  push:
    branches:
      - main

    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:

  changes:
    runs-on: ubuntu-latest

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'

            frontend:
              - 'frontend/**'

  backend:
    needs: changes

    if: needs.changes.outputs.backend == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Secret Scanning
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      # Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::163053485065:role/github-actions-role
          aws-region: ap-south-1

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build & Push Backend Image
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true

          tags: |
            163053485065.dkr.ecr.ap-south-1.amazonaws.com/skillpulse-backend:latest
            163053485065.dkr.ecr.ap-south-1.amazonaws.com/skillpulse-backend:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: false
          sbom: false

      # Vulnerability Scan
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 163053485065.dkr.ecr.ap-south-1.amazonaws.com/skillpulse-backend:${{ github.sha }}
          format: table
          exit-code: 1
          vuln-type: os,library
          severity: CRITICAL

  frontend:
    needs: changes

    if: needs.changes.outputs.frontend == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Secret Scanning
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      # Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::163053485065:role/github-actions-role
          aws-region: ap-south-1

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build & Push Frontend Image
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true

          tags: |
            163053485065.dkr.ecr.ap-south-1.amazonaws.com/skillpulse-frontend:latest
            163053485065.dkr.ecr.ap-south-1.amazonaws.com/skillpulse-frontend:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: false
          sbom: false

      # Vulnerability Scan
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 163053485065.dkr.ecr.ap-south-1.amazonaws.com/skillpulse-frontend:${{ github.sha }}
          format: table
          exit-code: 1
          vuln-type: os,library
          severity: CRITICAL