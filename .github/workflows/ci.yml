name: CI Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  changes:
    runs-on: ubuntu-latest

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

            frontend:
              - 'frontend/**'

  backend:
    needs: changes

    # if: needs.changes.outputs.backend == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Secret Scanning
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2



      #Docker Build Optimization
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      #DockerHub Login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push Backend Image
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true

          tags: |
            srini2390/skillpulse-backend:latest
            srini2390/skillpulse-backend:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: false
          sbom: false

      #Container Vulnerability Scan
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: srini2390/skillpulse-backend:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  frontend:
    needs: changes

    # if: needs.changes.outputs.frontend == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      #Shift-Left Security - Secret Scanning
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      #Docker Build Optimization
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      #DockerHub Login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      #Build & Push Frontend Image
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true

          tags: |
            srini2390/skillpulse-frontend:latest
            srini2390/skillpulse-frontend:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: false
          sbom: false

      #Container Vulnerability Scan
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: srini2390/skillpulse-frontend:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'