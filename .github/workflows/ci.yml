name: CI Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  changes:
    runs-on: ubuntu-latest

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

            frontend:
              - 'frontend/**'

  backend:
    needs: changes

    if: needs.changes.outputs.backend == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true

          tags: |
            srini2390/skillpulse-backend:latest
            srini2390/skillpulse-backend:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: false
          sbom: false

  frontend:
    needs: changes

    if: needs.changes.outputs.frontend == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true

          tags: |
            srini2390/skillpulse-frontend:latest
            srini2390/skillpulse-frontend:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: false
          sbom: false