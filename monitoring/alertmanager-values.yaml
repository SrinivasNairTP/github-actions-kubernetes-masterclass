alertmanager:
  enabled: true

alertmanagerFiles:
  alertmanager.yml:
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-notifications

    receivers:
      - name: slack-notifications

        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-secret/slack_api_url

            channel: '#devops-alerts'

            send_resolved: true

            title: '{{ .CommonAnnotations.summary }}'

            text: '{{ .CommonAnnotations.description }}'