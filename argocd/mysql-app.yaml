apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: mysql
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/SrinivasNairTP/github-actions-kubernetes-masterclass.git
    targetRevision: main
    path: helm/mysql

  destination:
    server: https://kubernetes.default.svc
    namespace: skillpulse

  syncPolicy:
    automated:
      prune: true
      selfHeal: true