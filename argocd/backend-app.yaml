apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: backend
  namespace: argocd
  annotations:
   argocd-image-updater.argoproj.io/image-list: backend=srini2390/skillpulse-backend
   argocd-image-updater.argoproj.io/backend.update-strategy: newest-build
   argocd-image-updater.argoproj.io/write-back-method: git

spec:
  project: default

  source:
    repoURL: https://github.com/SrinivasNairTP/github-actions-kubernetes-masterclass.git
    targetRevision: main
    path: helm/backend

  destination:
    server: https://kubernetes.default.svc
    namespace: skillpulse

  syncPolicy:
    automated:
      prune: true
      selfHeal: true